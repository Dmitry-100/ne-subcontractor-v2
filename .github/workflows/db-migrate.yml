name: subcontractor-v2-db-migrate

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: "Target environment label (dev/stage/prod)"
        required: true
        default: "dev"

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Subcontractor.sln --verbosity minimal

      - name: Build DbMigrator
        run: dotnet build src/Subcontractor.DbMigrator/Subcontractor.DbMigrator.csproj --no-restore -v minimal

      - name: Apply EF Migrations and Seed Roles
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.SUBCONTRACTOR_SQL_CONNECTION_STRING }}
        run: dotnet run --project src/Subcontractor.DbMigrator/Subcontractor.DbMigrator.csproj
