name: subcontractor-v2-ci

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Subcontractor.sln --verbosity minimal

      - name: Build
        run: dotnet build Subcontractor.sln --no-restore -v minimal

      - name: Test
        run: dotnet test Subcontractor.sln --no-build --verbosity minimal

      - name: DbMigrator Dry Run
        run: dotnet run --project src/Subcontractor.DbMigrator/Subcontractor.DbMigrator.csproj -- --dry-run
